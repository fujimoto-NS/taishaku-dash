<style>
*{box-sizing:border-box}html,body{height:100%;margin:0;overflow:hidden;background:#14142a;color:#fff;font-family:"Hiragino Maru Gothic ProN","Yu Gothic",sans-serif;touch-action:none;user-select:none}#app{position:fixed;inset:0;display:grid;place-items:center;background:radial-gradient(circle at 20% 15%,#3b3268,transparent 38%),#14142a}#stage{position:relative;width:min(100vw,calc(100vh*.62));height:100%;overflow:hidden;box-shadow:0 0 60px #0008}canvas{width:100%;height:100%;display:block}.screen{position:absolute;inset:0;z-index:5;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:18px;text-align:center;background:#101229d9}.hidden{display:none}.logo{font-size:clamp(38px,12vmin,64px);font-weight:900;line-height:1.05;color:#ffe55f;text-shadow:0 5px 0 #0008;transform:rotate(-3deg)}.sub{color:#d9ddff;font-weight:800;font-size:clamp(13px,4vmin,18px)}.rules,.panel{max-width:92%;background:#ffffff16;border:1px solid #ffffff22;border-radius:14px;padding:12px 14px;line-height:1.75;font-weight:700;font-size:clamp(12px,3.5vmin,15px)}button,a.btn{appearance:none;border:0;border-radius:999px;padding:13px 22px;width:min(82%,330px);font:900 clamp(17px,5.2vmin,25px)/1.2 inherit;color:#fff;background:linear-gradient(#5cdb5c,#249624);box-shadow:0 6px 0 #126512;text-decoration:none;cursor:pointer}button:active,a.btn:active{transform:translateY(4px);box-shadow:0 2px 0 #126512}.orange{background:linear-gradient(#ffbf56,#ed7a00);box-shadow:0 6px 0 #a94f00}.dark{background:linear-gradient(#59606f,#171b24);box-shadow:0 6px 0 #000}.small{font-size:clamp(11px,3vmin,13px);color:#bfc6ef}.hud{position:absolute;inset:0;z-index:2;pointer-events:none}.top{display:flex;justify-content:space-between;padding:max(10px,env(safe-area-inset-top)) 10px 0;font-weight:900;text-shadow:0 2px 0 #0008}.q{margin:8px auto 0;max-width:90%;background:linear-gradient(#fff,#ffe8a8);color:#4c2b00;border:4px solid #ff9f1c;border-radius:17px;padding:8px 14px;text-align:center;font-weight:900;font-size:clamp(17px,5vmin,25px);box-shadow:0 5px 0 #0004}.toast{position:absolute;left:50%;bottom:25%;transform:translateX(-50%);max-width:88%;padding:10px 16px;border-radius:14px;background:#111936ee;border:3px solid #666;text-align:center;font-weight:900;opacity:0;transition:.18s}.toast.show{opacity:1}.good{border-color:#42e386}.bad{border-color:#ff6060}.links{display:grid;gap:9px;width:min(92%,380px)}.links a{display:block;border-radius:12px;padding:11px 13px;color:#fff;text-decoration:none;font-weight:900;line-height:1.35}.site{background:linear-gradient(#1f8f5f,#11613f)}.x{background:linear-gradient(#4a5163,#171b24)}#review{max-height:28vh;overflow:auto;text-align:left}.debit{color:#7ec1ff}.credit{color:#ff9aa6}
</style>
</head>
<body><div id="app"><div id="stage"><canvas id="cv"></canvas>
<div class="hud hidden" id="hud"><div class="top"><div><div id="lives">❤️❤️❤️</div><div id="score">SCORE 0</div><div id="level">基礎</div></div><button id="pause" style="width:44px;height:44px;padding:0">⏸</button></div><div class="q" id="question"></div><div class="toast" id="toast"></div></div>
<section class="screen" id="title"><div class="logo">貸借ダッシュ！</div><div class="sub">〜 日商簿記3級の勘定科目をマスター 〜</div><div class="rules"><b class="debit">借方（左）</b>に増える＝資産・費用<br><b class="credit">貸方（右）</b>に増える＝負債・純資産・収益<br>左右に動いて、正しいゲートへ！</div><button id="startEasy">🔰 ビギナー</button><button id="startNormal" class="orange">🔥 ノーマル</button><div class="small">操作：左右タップ / スワイプ / ← → キー</div></section>
<section class="screen hidden" id="over"><div class="logo" style="font-size:clamp(30px,9vmin,48px)">GAME OVER</div><div id="final" style="font-size:clamp(27px,8vmin,40px);font-weight:900;color:#ffe55f"></div><div id="meta" class="sub"></div><div class="panel" id="review"></div><div class="links"><a class="site" target="_blank" rel="noopener" href="https://www.net-school.co.jp/?utm_source=taishaku_dash&utm_medium=browser_game&utm_campaign=boki3_learning&utm_content=game_over_cta">ネットスクールで簿記講座・教材を見る<br><span class="small">ゲームの続きは、教材と講義で確認</span></a><a class="x" target="_blank" rel="noopener" href="https://x.com/NS_Fujimoto">制作者のXをフォローする<br><span class="small">簿記学習・教材づくりの情報を発信中</span></a></div><button id="share" class="dark">𝕏 スコアをシェア</button><button id="retry">もう一回</button></section>
</div></div><script>
const $=id=>document.getElementById(id),cv=$('cv'),ctx=cv.getContext('2d');let W=0,H=0,state='title',lane=0,target=0,score=0,lives=3,ok=0,combo=0,mode='ビギナー',speed=5,dist=0,gate=null,last=0,answered=[];
const Q=[
['現金が増えた','L','資産','現金は資産。増えたら借方（左）'],['現金が減少した','R','資産','資産の減少は貸方（右）'],['売掛金が増えた','L','資産','売掛金は資産。増えたら借方（左）'],['売掛金が減少した','R','資産','資産の減少は貸方（右）'],['受取手形が増えた','L','資産','受取手形は資産。増えたら借方（左）'],['受取手形が減少した','R','資産','資産の減少は貸方（右）'],['普通預金が増えた','L','資産','普通預金は資産。増えたら借方（左）'],['普通預金が減少した','R','資産','資産の減少は貸方（右）'],['備品が増えた','L','資産','備品は資産。増えたら借方（左）'],['備品が減少した','R','資産','資産の減少は貸方（右）'],['貸付金が増えた','L','資産','貸付金は資産。増えたら借方（左）'],['貸付金が減少した','R','資産','資産の減少は貸方（右）'],['前払金が増えた','L','資産','前払金は資産。増えたら借方（左）'],['前払金が減少した','R','資産','資産の減少は貸方（右）'],['未収入金が増えた','L','資産','未収入金は資産。増えたら借方（左）'],['未収入金が減少した','R','資産','資産の減少は貸方（右）'],
['買掛金が増えた','R','負債','買掛金は負債。増えたら貸方（右）'],['買掛金が減少した','L','負債','負債の減少は借方（左）'],['支払手形が増えた','R','負債','支払手形は負債。増えたら貸方（右）'],['支払手形が減少した','L','負債','負債の減少は借方（左）'],['借入金が増えた','R','負債','借入金は負債。増えたら貸方（右）'],['借入金が減少した','L','負債','負債の減少は借方（左）'],['未払金が増えた','R','負債','未払金は負債。増えたら貸方（右）'],['未払金が減少した','L','負債','負債の減少は借方（左）'],['前受金が増えた','R','負債','前受金は負債。増えたら貸方（右）'],['前受金が減少した','L','負債','負債の減少は借方（左）'],['預り金が増えた','R','負債','預り金は負債。増えたら貸方（右）'],['預り金が減少した','L','負債','負債の減少は借方（左）'],
['資本金が増えた','R','純資産','資本金は純資産。増えたら貸方（右）'],['資本金が減少した','L','純資産','純資産の減少は借方（左）'],['売上が発生した','R','収益','収益が発生したら貸方（右）'],['受取手数料が発生した','R','収益','収益が発生したら貸方（右）'],['受取利息が発生した','R','収益','収益が発生したら貸方（右）'],['雑収入が発生した','R','収益','収益が発生したら貸方（右）'],['仕入が発生した','L','費用','費用が発生したら借方（左）'],['給料が発生した','L','費用','費用が発生したら借方（左）'],['通信費が発生した','L','費用','費用が発生したら借方（左）'],['水道光熱費が発生した','L','費用','費用が発生したら借方（左）'],['支払家賃が発生した','L','費用','費用が発生したら借方（左）'],['広告宣伝費が発生した','L','費用','費用が発生したら借方（左）'],['支払利息が発生した','L','費用','費用が発生したら借方（左）'],['租税公課が発生した','L','費用','費用が発生したら借方（左）']
].map(x=>({q:x[0],side:x[1],cat:x[2],why:x[3]}));
function resize(){const r=cv.getBoundingClientRect();W=cv.width=Math.round(r.width*devicePixelRatio);H=cv.height=Math.round(r.height*devicePixelRatio);ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);W=r.width;H=r.height}addEventListener('resize',resize);resize();
function start(m){mode=m;speed=m==='ビギナー'?4.2:5.6;score=0;lives=3;ok=0;combo=0;dist=0;lane=0;target=0;answered=[];state='play';$('title').classList.add('hidden');$('over').classList.add('hidden');$('hud').classList.remove('hidden');nextQ();updateHud()}
function nextQ(){const q=Q[Math.random()*Q.length|0];gate={z:42,q,done:false};$('question').textContent='Q. '+q.q}
function updateHud(){$('lives').textContent='❤️'.repeat(lives);$('score').textContent='SCORE '+score;$('level').textContent=ok<8?'基礎':ok<18?'標準':'応用'}
function toast(t,c){const e=$('toast');e.innerHTML=t;e.className='toast show '+c;clearTimeout(e.t);e.t=setTimeout(()=>e.className='toast '+c,900)}
function hit(){if(!gate||gate.done)return;gate.done=true;const choose=lane<0?'L':'R',good=choose===gate.q.side;answered.push({q:gate.q,good});if(good){combo++;ok++;score+=100+combo*20;toast('⭕ 正解！ '+gate.q.why,'good')}else{combo=0;lives--;toast('❌ 正解は '+(gate.q.side==='L'?'借方（左）':'貸方（右）'),'bad')}updateHud();setTimeout(lives?nextQ:over,850)}
function over(){state='over';$('hud').classList.add('hidden');$('over').classList.remove('hidden');$('final').textContent='SCORE '+score;$('meta').textContent=mode+'モード ／ '+ok+'問正解';$('review').innerHTML='<b>今回のふりかえり</b><br>'+answered.slice(-12).map(a=>(a.good?'⭕ ':'❌ ')+a.q.q+' → <span class="'+(a.q.side==='L'?'debit':'credit')+'">'+(a.q.side==='L'?'借方':'貸方')+'</span><br><small>'+a.q.why+'</small>').join('<hr style="border-color:#ffffff22">')}
function yAt(z){return H*.22+(H*.72)*(1-1/(1+z*.08))}function scale(z){return Math.max(.08,1/(1+z*.08))}function roadHalf(){return Math.min(W*.38,180)}
function draw(){ctx.clearRect(0,0,W,H);let g=ctx.createLinearGradient(0,0,0,H*.45);g.addColorStop(0,'#5b7bdb');g.addColorStop(1,'#ffd38b');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.fillStyle='#367f50';ctx.fillRect(0,H*.35,W,H*.65);ctx.fillStyle='#3d3d48';ctx.beginPath();ctx.moveTo(W/2-roadHalf(),H);ctx.lineTo(W/2-20,H*.35);ctx.lineTo(W/2+20,H*.35);ctx.lineTo(W/2+roadHalf(),H);ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=4;ctx.setLineDash([28,28]);ctx.beginPath();ctx.moveTo(W/2,H);ctx.lineTo(W/2,H*.35);ctx.stroke();ctx.setLineDash([]);for(let i=0;i<12;i++){const z=i*6-(dist%6);const y=yAt(z),s=scale(z);ctx.font=28*s+'px sans-serif';ctx.fillText(i%2?'🏢':'🌳',W*.12,y);ctx.fillText(i%2?'🏬':'🌳',W*.82,y)}if(gate){const z=gate.z,s=scale(z),y=yAt(z),h=180*s,w=roadHalf()*s*.8;[['L','借方','#2f6fd0',-1],['R','貸方','#d04a4a',1]].forEach(a=>{const x=W/2+a[3]*roadHalf()*s*.45;ctx.fillStyle=a[2];ctx.fillRect(x-w/2,y-h,w,h);ctx.fillStyle='#fff';ctx.font='900 '+Math.max(14,28*s)+'px sans-serif';ctx.textAlign='center';ctx.fillText(a[1],x,y-h-10*s)});if(mode==='ビギナー'){const wrong=gate.q.side==='L'?1:-1;ctx.font=40*s+'px sans-serif';ctx.fillText('⚠️',W/2+wrong*roadHalf()*s*.45,y+36*s)}}target=lane;const px=W/2+target*roadHalf()*.5;ctx.font=Math.min(58,W*.11)+'px sans-serif';ctx.textAlign='center';ctx.fillText('🏃‍♂️',px,H*.78)}
function loop(t){const dt=Math.min((t-last)/1000,.05);last=t;if(state==='play'){dist+=speed*dt;if(gate){gate.z-=speed*dt;if(gate.z<1)hit();if(gate.z<-3)nextQ()}}draw();requestAnimationFrame(loop)}requestAnimationFrame(loop);
$('startEasy').onclick=()=>start('ビギナー');$('startNormal').onclick=()=>start('ノーマル');$('retry').onclick=()=>start(mode);$('pause').onclick=()=>{state=state==='play'?'pause':'play'};$('share').onclick=()=>{const text=`📒貸借ダッシュ！で SCORE ${score}。簿記3級の借方・貸方をランゲーム感覚で練習できます。`;open('https://twitter.com/intent/tweet?text='+encodeURIComponent(text)+'&url='+encodeURIComponent(location.href.split('#')[0])+'&hashtags='+encodeURIComponent('貸借ダッシュ,簿記3級'),'_blank','noopener')};
addEventListener('keydown',e=>{if(e.key==='ArrowLeft')lane=-1;if(e.key==='ArrowRight')lane=1});let sx=0;cv.addEventListener('pointerdown',e=>{sx=e.clientX});cv.addEventListener('pointerup',e=>{const dx=e.clientX-sx;if(Math.abs(dx)>25)lane=dx<0?-1:1;else lane=e.clientX<cv.getBoundingClientRect().left+cv.clientWidth/2?-1:1});
</script></body></html>
